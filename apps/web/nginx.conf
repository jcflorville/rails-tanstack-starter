server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Long cache for hashed assets.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA fallback — every unknown path returns index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Gzip basic text assets.
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/javascript application/xml application/xml+rss image/svg+xml;
  gzip_min_length 1024;
}
