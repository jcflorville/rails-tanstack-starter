name: Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. The more detail you provide, the faster we can help.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps that reproduce the problem.
      placeholder: |
        1. Run `docker compose up`
        2. Open http://localhost:5173
        3. Click on...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: commit
    attributes:
      label: Commit SHA or version
      description: Run `git rev-parse --short HEAD` to get the current commit.
      placeholder: e.g. 0c653dd
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Which app is affected?
      options:
        - apps/api (Rails)
        - apps/web (React)
        - Docker / local dev setup
        - Kamal / deploy
        - CI / GitHub Actions
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Docker version, browser if relevant.
      placeholder: |
        - OS: macOS 15.4
        - Docker: 27.2.0
        - Browser: Chrome 130
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Paste any relevant log output. This will be automatically formatted.
      render: shell
    validations:
      required: false
